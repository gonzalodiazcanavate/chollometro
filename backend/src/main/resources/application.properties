spring.application.name=backend

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/chollometro
spring.datasource.username=chollometro
spring.datasource.password=chollometro_dev

# JPA — deja que Flyway gestione el esquema
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Diagnóstico temporal
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
